name = "color-siege"
main = "src/server/index.ts"
compatibility_date = "2024-07-01"

routes = [
  { pattern = "color-siege.onnx.click/ws/*", zone_name = "onnx.click" }
]

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[durable_objects.bindings]]
name = "MATCHMAKER"
class_name = "Matchmaker"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom", "Matchmaker"]
